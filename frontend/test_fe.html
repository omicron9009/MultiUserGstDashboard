<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST API Tester</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1f2d45;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --accent3: #ff6b35;
    --accent4: #a78bfa;
    --text: #e2e8f0;
    --muted: #64748b;
    --danger: #f87171;
    --success: #4ade80;
    --warning: #fbbf24;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── LAYOUT ── */
  .app { display: flex; height: 100vh; position: relative; z-index: 1; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-logo {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--border);
  }

  .logo-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .logo-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .base-url-input {
    margin: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    width: calc(100% - 24px);
    outline: none;
    transition: border-color 0.2s;
  }
  .base-url-input:focus { border-color: var(--accent); }

  .sidebar-nav { flex: 1; overflow-y: auto; padding: 6px 0 12px; }
  .sidebar-nav::-webkit-scrollbar { width: 3px; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .nav-section { margin-bottom: 4px; }

  .nav-group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px 4px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
  }

  .nav-group-header .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px 6px 30px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    border-radius: 0 4px 4px 0;
    margin: 1px 4px 1px 0;
  }

  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(0,212,255,0.06); }

  .method-badge {
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .get { background: rgba(0,255,157,0.15); color: var(--accent2); }
  .post { background: rgba(167,139,250,0.15); color: var(--accent4); }

  /* DB section */
  .nav-item.db-item { padding-left: 14px; }

  /* ── MAIN PANEL ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }

  .topbar-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.ok { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.err { background: var(--danger); box-shadow: 0 0 6px var(--danger); }

  .status-code {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* ── PANELS ── */
  .panels { flex: 1; display: flex; overflow: hidden; }

  .request-panel {
    width: 400px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 18px;
    gap: 14px;
  }
  .request-panel::-webkit-scrollbar { width: 3px; }
  .request-panel::-webkit-scrollbar-thumb { background: var(--border); }

  .response-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-section { display: flex; flex-direction: column; gap: 8px; }

  .section-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .url-display {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    word-break: break-all;
    min-height: 36px;
  }

  label {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  label span { color: var(--text); font-weight: 600; font-size: 11px; }

  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  textarea { resize: vertical; min-height: 80px; }

  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .btn {
    padding: 10px 18px;
    border-radius: 7px;
    border: none;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-primary:hover { background: #33ddff; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,255,0.3); }

  .btn-success {
    background: var(--accent2);
    color: var(--bg);
  }
  .btn-success:hover { filter: brightness(1.1); transform: translateY(-1px); }

  .btn-warning {
    background: var(--warning);
    color: var(--bg);
  }
  .btn-warning:hover { filter: brightness(1.1); }

  .btn-sm {
    padding: 5px 10px;
    font-size: 10px;
    border-radius: 5px;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── RESPONSE AREA ── */
  .response-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 16px;
  }

  .resp-tab {
    padding: 11px 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .resp-tab:hover { color: var(--text); }
  .resp-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .response-body {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    position: relative;
  }
  .response-body::-webkit-scrollbar { width: 4px; }
  .response-body::-webkit-scrollbar-thumb { background: var(--border); }

  .json-viewer {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    padding: 16px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .json-key { color: #7dd3fc; }
  .json-str { color: #86efac; }
  .json-num { color: #fda4af; }
  .json-bool { color: var(--accent4); }
  .json-null { color: var(--muted); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
  }

  .empty-icon { font-size: 36px; opacity: 0.3; }
  .empty-text { font-family: var(--mono); font-size: 12px; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── DB PANEL ── */
  .db-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .db-topbar {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .db-topbar h2 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    min-width: 200px;
  }

  .db-content { flex: 1; display: flex; overflow: hidden; }

  .db-sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    padding: 12px 0;
  }

  .db-sidebar::-webkit-scrollbar { width: 3px; }
  .db-sidebar::-webkit-scrollbar-thumb { background: var(--border); }

  .db-sidebar-title {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 14px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
  }

  .db-table-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
  }
  .db-table-item:hover { color: var(--text); background: var(--surface2); }
  .db-table-item.active { color: var(--accent2); border-left-color: var(--accent2); background: rgba(0,255,157,0.05); }
  .db-table-item .icon { font-size: 13px; }

  .db-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .db-table-header {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .db-table-name {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--accent2);
  }

  .row-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  .db-filter-bar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-input {
    flex: 1;
    min-width: 200px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    outline: none;
  }
  .search-input:focus { border-color: var(--accent2); }

  .db-table-wrap {
    flex: 1;
    overflow: auto;
  }
  .db-table-wrap::-webkit-scrollbar { width: 4px; height: 4px; }
  .db-table-wrap::-webkit-scrollbar-thumb { background: var(--border); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }

  thead th {
    position: sticky;
    top: 0;
    background: var(--surface);
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }
  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent2); }

  tbody tr {
    border-bottom: 1px solid rgba(31,45,69,0.6);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--surface2); }

  tbody td {
    padding: 8px 14px;
    color: var(--text);
    vertical-align: top;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .cell-json {
    color: var(--muted);
    font-size: 10px;
  }

  .cell-null { color: var(--muted); font-style: italic; }
  .cell-bool-t { color: var(--success); }
  .cell-bool-f { color: var(--danger); }
  .cell-num { color: #fda4af; }

  .db-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--muted);
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
  }

  /* Session info bar */
  .session-bar {
    background: rgba(0,212,255,0.06);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 11px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .session-field { display: flex; flex-direction: column; gap: 2px; }
  .session-field .lbl { color: var(--muted); font-size: 9px; letter-spacing: 1px; }
  .session-field .val { color: var(--accent); }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 9999;
  }

  .toast {
    padding: 10px 16px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    animation: slideIn 0.3s ease;
    max-width: 300px;
  }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.info { border-color: var(--accent); color: var(--accent); }

  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* Scrollbar global */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .hidden { display: none !important; }

  .tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .flex-row { display: flex; gap: 8px; align-items: center; }
  .flex-col { display: flex; flex-direction: column; gap: 8px; }
  .mt-2 { margin-top: 4px; }

  .hint {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<div class="app">
  <!-- ── SIDEBAR ── -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-tag">GST API</div>
      <div class="logo-title">Dev Console</div>
    </div>
    <input class="base-url-input" id="baseUrl" value="http://localhost:8000" placeholder="Base URL">
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </div>

  <!-- ── MAIN ── -->
  <div class="main" id="mainContent">
    <!-- API panel -->
    <div id="apiPanel" class="hidden" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div class="topbar">
        <div class="status-dot" id="statusDot"></div>
        <div class="topbar-title" id="topbarTitle">Select an endpoint</div>
        <div class="status-code" id="statusCodeBadge"></div>
        <div class="status-code" id="responseTime"></div>
      </div>
      <div class="panels">
        <!-- Request panel -->
        <div class="request-panel" id="requestPanel"></div>
        <!-- Response panel -->
        <div class="response-panel">
          <div class="response-tabs">
            <div class="resp-tab active" onclick="switchRespTab('body',this)">Response</div>
            <div class="resp-tab" onclick="switchRespTab('headers',this)">Headers</div>
            <div class="resp-tab" onclick="switchRespTab('raw',this)">Raw</div>
          </div>
          <div class="response-body" id="responseBody">
            <div class="empty-state">
              <div class="empty-icon">⚡</div>
              <div class="empty-text">Fire a request to see the response</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- DB panel -->
    <div id="dbPanel" class="hidden db-panel">
      <div class="db-topbar">
        <h2>📦 Database Viewer</h2>
        <input class="search-input" style="max-width:220px" id="dbSearchGlobal" placeholder="Search tables..." oninput="filterDbTables(this.value)">
        <input class="search-input" style="max-width:220px" id="dbUrlInput" placeholder="DB API base (optional override)">
        <button class="btn btn-success btn-sm" onclick="loadDbTables()">↻ Refresh Tables</button>
      </div>
      <div class="db-content">
        <div class="db-sidebar">
          <div class="db-sidebar-title">Tables</div>
          <div id="dbTableList"><div class="db-empty" style="height:100px;">No tables loaded</div></div>
        </div>
        <div class="db-main">
          <div id="dbTableContent">
            <div class="db-empty" style="height:300px;">
              <span style="font-size:32px;opacity:0.2">🗄️</span>
              <span>Select a table to explore</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Welcome screen -->
    <div id="welcomeScreen" style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
      <div style="font-size:48px;opacity:0.15">⚡</div>
      <div style="font-family:var(--mono);color:var(--muted);font-size:13px;">Select an endpoint from the sidebar</div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const getBase = () => document.getElementById('baseUrl').value.replace(/\/$/, '');

// Session memory
let sessionData = {};
let currentResponseData = null;
let currentResponseHeaders = null;
let currentRespTab = 'body';
let sortState = {};

// ══════════════════════════════════════════════
// ENDPOINTS DEFINITION
// ══════════════════════════════════════════════
const GROUPS = [
  {
    name: 'Auth', color: '#a78bfa', tag: 'AUTH',
    items: [
      {
        id: 'gen-otp', label: 'Generate OTP', method: 'POST', path: '/auth/generate-otp',
        body: [
          { key: 'username', label: 'Username', type: 'text', placeholder: 'portal username' },
          { key: 'gstin', label: 'GSTIN', type: 'text', placeholder: '22AAAAA0000A1Z5' }
        ],
        note: 'Step 1: Triggers OTP to registered mobile'
      },
      {
        id: 'verify-otp', label: 'Verify OTP', method: 'POST', path: '/auth/verify-otp',
        body: [
          { key: 'username', label: 'Username', type: 'text', placeholder: 'portal username' },
          { key: 'gstin', label: 'GSTIN', type: 'text', placeholder: '22AAAAA0000A1Z5' },
          { key: 'otp', label: 'OTP', type: 'text', placeholder: '6-digit OTP' }
        ],
        note: 'Step 2: Submit OTP to get session'
      },
      {
        id: 'refresh', label: 'Refresh Session', method: 'POST', path: '/auth/refresh',
        body: [
          { key: 'gstin', label: 'GSTIN', type: 'text', placeholder: '22AAAAA0000A1Z5' }
        ],

// ── ENDPOINT SELECTION ──
let currentEndpoint = null;

function selectEndpoint(id) {
  // find
  let ep = null;
  for (const g of GROUPS) {
    ep = g.items.find(x => x.id === id);
    if (ep) break;
  }
  if (!ep) return;
  currentEndpoint = ep;

  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-' + id)?.classList.add('active');

  document.getElementById('welcomeScreen').classList.add('hidden');
  document.getElementById('dbPanel').classList.add('hidden');
  const apiPanel = document.getElementById('apiPanel');
  apiPanel.classList.remove('hidden');
  apiPanel.style.display = 'flex';

  document.getElementById('topbarTitle').textContent = `${ep.method}  ${ep.path}`;
  document.getElementById('statusDot').className = 'status-dot';
  document.getElementById('statusCodeBadge').textContent = '';
  document.getElementById('responseTime').textContent = '';

  buildRequestPanel(ep);
  showEmptyResponse();
}

function buildRequestPanel(ep) {
  const panel = document.getElementById('requestPanel');
  let html = '';

  // Endpoint info
  html += `<div class="panel-section">
    <div class="section-label">Endpoint</div>
    <div class="url-display" id="liveUrl">${getBase()}${ep.path}</div>`;
  if (ep.note) html += `<div class="hint">ℹ️ ${ep.note}</div>`;
  html += '</div>';

  // Session prefill
  html += `<div class="panel-section">
    <div class="section-label">Quick Fill from Session</div>
    <div class="session-bar" id="sessionBar">
      <div class="session-field"><div class="lbl">GSTIN</div><div class="val" id="sess-gstin">${sessionData.gstin || '—'}</div></div>
      <div class="session-field"><div class="lbl">Username</div><div class="val" id="sess-user">${sessionData.username || '—'}</div></div>
      <button class="btn btn-ghost btn-sm" onclick="prefillFromSession()">⚡ Prefill</button>
    </div>
  </div>`;

  // Path params
  if (ep.path_params?.length) {
    html += `<div class="panel-section"><div class="section-label">Path Parameters</div>`;
    html += `<div class="flex-col">`;
    ep.path_params.forEach(p => {
      const placeholder = p === 'gstin' ? '22AAAAA0000A1Z5' : p === 'year' ? '2024' : p === 'month' ? '01' : p;
      html += `<label><span>${p}</span>
        <input id="pp-${p}" data-param="${p}" type="text" placeholder="${placeholder}" oninput="updateLiveUrl()" value="${getDefaultPathParam(p, ep)}">
      </label>`;
    });
    html += '</div></div>';
  }

  // Query params
  if (ep.query_params?.length) {
    html += `<div class="panel-section"><div class="section-label">Query Parameters</div><div class="flex-col">`;
    ep.query_params.forEach(q => {
      if (q.type === 'select') {
        html += `<label><span>${q.label}${q.required ? ' *' : ''}</span>
          <select id="qp-${q.key}" oninput="updateLiveUrl()">
            ${q.options.map(o => `<option value="${o}" ${o===q.default?'selected':''}>${o}</option>`).join('')}
          </select></label>`;
      } else {
        html += `<label><span>${q.label}${q.required ? ' *' : ''}</span>
          <input id="qp-${q.key}" type="text" placeholder="${q.placeholder||''}" oninput="updateLiveUrl()">
        </label>`;
      }
    });
    html += '</div></div>';
  }

  // Body params (POST)
  if (ep.body?.length) {
    html += `<div class="panel-section"><div class="section-label">Request Body (JSON)</div><div class="flex-col">`;
    ep.body.forEach(b => {
      html += `<label><span>${b.label}</span>
        <input id="bp-${b.key}" type="${b.type||'text'}" placeholder="${b.placeholder||''}">
      </label>`;
    });
    html += '</div></div>';
  }

  // Fire button
  html += `<button class="btn btn-primary" onclick="fireRequest()" style="width:100%">
    ${ep.method === 'POST' ? '▶ Send POST' : '▶ Send GET'}
  </button>`;

  panel.innerHTML = html;
  updateLiveUrl();
}

function getDefaultPathParam(p, ep) {
  if (p === 'gstin') return sessionData.gstin || '';
  if (p === 'year') {
    const d = new Date();
    return String(d.getFullYear());
  }
  if (p === 'month') {
    const d = new Date();
    return String(d.getMonth() + 1).padStart(2, '0');
  }
  return '';
}

function prefillFromSession() {
  if (!sessionData.gstin) { toast('No session data. Use Auth → Generate OTP first.', 'info'); return; }
  const gEl = document.getElementById('pp-gstin');
  const uEl = document.getElementById('bp-username');
  const gEl2 = document.getElementById('bp-gstin');
  if (gEl) gEl.value = sessionData.gstin;
  if (uEl) uEl.value = sessionData.username || '';
  if (gEl2) gEl2.value = sessionData.gstin;
  updateLiveUrl();
  toast('Prefilled from session!', 'success');
}

function updateLiveUrl() {
  if (!currentEndpoint) return;
  let url = getBase() + currentEndpoint.path;

  // Replace path params
  if (currentEndpoint.path_params) {
    currentEndpoint.path_params.forEach(p => {
      const el = document.getElementById('pp-' + p);
      const val = el ? el.value.trim() : `{${p}}`;
      url = url.replace(`{${p}}`, val || `{${p}}`);
    });
  }

  // Add query params
  const qps = [];
  if (currentEndpoint.query_params) {
    currentEndpoint.query_params.forEach(q => {
      const el = document.getElementById('qp-' + q.key);
      if (el && el.value.trim()) qps.push(`${q.key}=${encodeURIComponent(el.value.trim())}`);
    });
  }
  if (qps.length) url += '?' + qps.join('&');

  const el = document.getElementById('liveUrl');
  if (el) el.textContent = url;
}

// ── FIRE REQUEST ──
async function fireRequest() {
  if (!currentEndpoint) return;

  const ep = currentEndpoint;
  let url = document.getElementById('liveUrl').textContent;

  const opts = { method: ep.method, headers: { 'Content-Type': 'application/json' } };

  if (ep.method === 'POST' && ep.body) {
    const bodyObj = {};
    ep.body.forEach(b => {
      const el = document.getElementById('bp-' + b.key);
      if (el) bodyObj[b.key] = el.value.trim();
    });
    opts.body = JSON.stringify(bodyObj);
  }

  showLoading();
  const t0 = Date.now();

  try {
    const resp = await fetch(url, opts);
    const elapsed = Date.now() - t0;
    const ct = resp.headers.get('content-type') || '';
    let data;
    if (ct.includes('json')) data = await resp.json();
    else data = await resp.text();

    currentResponseData = data;
    currentResponseHeaders = {};
    resp.headers.forEach((v, k) => currentResponseHeaders[k] = v);

    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot ' + (resp.ok ? 'ok' : 'err');
    document.getElementById('statusCodeBadge').textContent = `${resp.status} ${resp.statusText}`;
    document.getElementById('responseTime').textContent = `${elapsed}ms`;

    // Auto-save session from auth responses
    if (ep.id === 'gen-otp' || ep.id === 'verify-otp' || ep.id === 'refresh') {
      const gEl = document.getElementById('bp-gstin') || document.getElementById('pp-gstin');
      const uEl = document.getElementById('bp-username');
      if (gEl) sessionData.gstin = gEl.value.trim();
      if (uEl) sessionData.username = uEl.value.trim();
      updateSessionUI();
    }

    renderResponse(data);
    toast(`${resp.status} — ${elapsed}ms`, resp.ok ? 'success' : 'error');
  } catch (e) {
    document.getElementById('statusDot').className = 'status-dot err';
    document.getElementById('statusCodeBadge').textContent = 'Network Error';
    renderError(e.message);
    toast('Request failed: ' + e.message, 'error');
  }
}

function updateSessionUI() {
  const g = document.getElementById('sess-gstin');
  const u = document.getElementById('sess-user');
  if (g) g.textContent = sessionData.gstin || '—';
  if (u) u.textContent = sessionData.username || '—';
}

// ── RESPONSE RENDERING ──
function showLoading() {
  document.getElementById('responseBody').innerHTML = `
    <div class="loading"><div class="spinner"></div> Fetching...</div>`;
}

function showEmptyResponse() {
  currentRespTab = 'body';
  document.getElementById('responseBody').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⚡</div>
      <div class="empty-text">Fire a request to see the response</div>
    </div>`;
}

function renderResponse(data) {
  if (currentRespTab === 'headers') { renderHeaders(); return; }
  if (currentRespTab === 'raw') { renderRaw(); return; }
  renderBody(data);
}

function renderBody(data) {
  const body = document.getElementById('responseBody');
  body.style.position = 'relative';
  const pretty = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
  const highlighted = syntaxHighlight(pretty);
  body.innerHTML = `
    <button class="copy-btn" onclick="copyResp()">Copy</button>
    <div class="json-viewer">${highlighted}</div>`;
}

function renderHeaders() {
  if (!currentResponseHeaders) return;
  const body = document.getElementById('responseBody');
  const rows = Object.entries(currentResponseHeaders)
    .map(([k,v]) => `<tr><td style="color:var(--accent);padding:8px 14px;font-family:var(--mono);font-size:12px;border-bottom:1px solid var(--border);white-space:nowrap;">${k}</td><td style="padding:8px 14px;font-family:var(--mono);font-size:12px;border-bottom:1px solid var(--border);color:var(--text);">${v}</td></tr>`)
    .join('');
  body.innerHTML = `<table><thead><tr><th>Header</th><th>Value</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderRaw() {
  if (!currentResponseData) return;
  const body = document.getElementById('responseBody');
  const raw = typeof currentResponseData === 'string' ? currentResponseData : JSON.stringify(currentResponseData);
  body.innerHTML = `<div class="json-viewer" style="color:var(--muted);word-break:break-all;">${escapeHtml(raw)}</div>`;
}

function renderError(msg) {
  document.getElementById('responseBody').innerHTML = `
    <div class="json-viewer" style="color:var(--danger);">Error: ${escapeHtml(msg)}</div>`;
}

function switchRespTab(tab, el) {
  currentRespTab = tab;
  document.querySelectorAll('.resp-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (!currentResponseData && !currentResponseHeaders) return;
  if (tab === 'body') renderBody(currentResponseData);
  else if (tab === 'headers') renderHeaders();
  else renderRaw();
}

function copyResp() {
  const text = typeof currentResponseData === 'string' ? currentResponseData : JSON.stringify(currentResponseData, null, 2);
  navigator.clipboard.writeText(text).then(() => toast('Copied!', 'success'));
}

function syntaxHighlight(json) {
  return escapeHtml(json).replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    m => {
      let cls = 'json-num';
      if (/^"/.test(m)) { cls = /:$/.test(m) ? 'json-key' : 'json-str'; }
      else if (/true|false/.test(m)) cls = 'json-bool';
      else if (/null/.test(m)) cls = 'json-null';
      return `<span class="${cls}">${m}</span>`;
    }
  );
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let dbTables = [];
let dbCurrentTable = null;
let dbCurrentData = [];
let dbSortCol = null;
let dbSortDir = 1;

function showDb() {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector('.db-item')?.classList.add('active');
  document.getElementById('welcomeScreen').classList.add('hidden');
  document.getElementById('apiPanel').classList.add('hidden');
  document.getElementById('dbPanel').classList.remove('hidden');
  loadDbTables();
}

async function loadDbTables() {
  const base = document.getElementById('dbUrlInput').value || getBase();
  toast('Loading DB schema…', 'info');
  try {
    // Try common endpoints for table listing
    const endpoints = [
      `${base}/db/tables`,
      `${base}/admin/tables`,
      `${base}/tables`,
      `${base}/schema`,
      `${base}/debug/tables`
    ];

    let found = false;
    for (const url of endpoints) {
      try {
        const r = await fetch(url);
        if (r.ok) {
          const d = await r.json();
          const tables = Array.isArray(d) ? d : d.tables || d.data || Object.keys(d);
          dbTables = tables;
          renderDbTableList(tables);
          toast(`Found ${tables.length} tables`, 'success');
          found = true;
          break;
        }
      } catch {}
    }

    if (!found) {
      // Fallback: show manual entry
      renderDbManualFallback();
    }
  } catch (e) {
    renderDbManualFallback();
  }
}

function renderDbManualFallback() {
  const list = document.getElementById('dbTableList');
  list.innerHTML = `
    <div style="padding:10px 14px;">
      <div class="hint" style="margin-bottom:8px;">No /db/tables endpoint found.<br>Enter table names manually:</div>
      <textarea id="manualTables" placeholder="sessions\ngstr1_invoices\ngstr2a_invoices\n..." style="height:120px;font-size:11px;"></textarea>
      <button class="btn btn-success btn-sm" style="margin-top:6px;width:100%" onclick="loadManualTables()">Load Tables</button>
    </div>`;
}

function loadManualTables() {
  const val = document.getElementById('manualTables').value;
  const tables = val.split('\n').map(t => t.trim()).filter(Boolean);
  dbTables = tables;
  renderDbTableList(tables);
}

function renderDbTableList(tables) {
  const list = document.getElementById('dbTableList');
  if (!tables.length) { list.innerHTML = '<div class="db-empty" style="height:80px;">No tables</div>'; return; }
  list.innerHTML = tables.map(t =>
    `<div class="db-table-item" id="dbt-${CSS.escape(t)}" onclick="loadTableData('${t}')">
      <span class="icon">📋</span>${t}
    </div>`
  ).join('');
}

function filterDbTables(q) {
  document.querySelectorAll('.db-table-item').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

async function loadTableData(tableName) {
  dbCurrentTable = tableName;
  document.querySelectorAll('.db-table-item').forEach(e => e.classList.remove('active'));
  document.getElementById(`dbt-${CSS.escape(tableName)}`)?.classList.add('active');

  const base = document.getElementById('dbUrlInput').value || getBase();
  const content = document.getElementById('dbTableContent');
  content.innerHTML = `<div class="loading" style="height:200px"><div class="spinner"></div> Loading ${tableName}…</div>`;

  // Try several patterns
  const urls = [
    `${base}/db/${tableName}`,
    `${base}/admin/${tableName}`,
    `${base}/${tableName}`,
    `${base}/debug/${tableName}`,
    `${base}/data/${tableName}`,
  ];

  let data = null;
  let usedUrl = null;
  for (const url of urls) {
    try {
      const r = await fetch(url);
      if (r.ok) { data = await r.json(); usedUrl = url; break; }
    } catch {}
  }

  if (!data) {
    // Build a generic query form
    content.innerHTML = buildGenericQueryForm(tableName, base);
    return;
  }

  const rows = Array.isArray(data) ? data : data.data || data.rows || data.items || data.results || [];
  dbCurrentData = rows;
  renderDataTable(tableName, rows, usedUrl);
}

function buildGenericQueryForm(tableName, base) {
  return `
    <div class="db-table-header">
      <span class="db-table-name">${tableName}</span>
      <span style="color:var(--muted);font-family:var(--mono);font-size:11px;">Manual Query</span>
    </div>
    <div style="padding:16px;display:flex;flex-direction:column;gap:12px;max-width:600px;">
      <div class="hint">Could not auto-load. Enter a URL to query this table:</div>
      <label><span>Endpoint URL</span>
        <input id="customTableUrl" value="${base}/${tableName}" type="text">
      </label>
      <label><span>Query String (optional)</span>
        <input id="customTableQuery" placeholder="limit=100&offset=0" type="text">
      </label>
      <button class="btn btn-success" onclick="fetchCustomTable()">▶ Fetch</button>
      <div id="customTableResult"></div>
    </div>`;
}

async function fetchCustomTable() {
  let url = document.getElementById('customTableUrl').value;
  const q = document.getElementById('customTableQuery').value;
  if (q) url += '?' + q;
  try {
    const r = await fetch(url);
    const data = await r.json();
    const rows = Array.isArray(data) ? data : data.data || data.rows || data.items || data.results || [data];
    dbCurrentData = rows;
    renderDataTable(dbCurrentTable, rows, url);
  } catch (e) {
    document.getElementById('customTableResult').innerHTML =
      `<div style="color:var(--danger);font-family:var(--mono);font-size:12px;">Error: ${e.message}</div>`;
  }
}

function renderDataTable(tableName, rows, sourceUrl) {
  const content = document.getElementById('dbTableContent');
  if (!rows.length) {
    content.innerHTML = `
      <div class="db-table-header"><span class="db-table-name">${tableName}</span><span class="row-count">0 rows</span></div>
      <div class="db-empty">No data found</div>`;
    return;
  }

  const cols = [...new Set(rows.flatMap(r => Object.keys(r)))];

  const headerRow = cols.map(c => `<th onclick="sortTable('${c}')" class="${dbSortCol===c?'sorted':''}">${c} ${dbSortCol===c?(dbSortDir>0?'↑':'↓'):''}</th>`).join('');

  const bodyRows = rows.map(row => {
    const cells = cols.map(c => {
      const v = row[c];
      if (v === null || v === undefined) return `<td class="cell-null">null</td>`;
      if (typeof v === 'boolean') return `<td class="${v?'cell-bool-t':'cell-bool-f'}">${v}</td>`;
      if (typeof v === 'number') return `<td class="cell-num">${v}</td>`;
      if (typeof v === 'object') return `<td class="cell-json">[obj]</td>`;
      const s = String(v);
      const display = s.length > 60 ? s.slice(0,60) + '…' : s;
      return `<td title="${escapeHtml(s)}">${escapeHtml(display)}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');

  content.innerHTML = `
    <div class="db-table-header">
      <span class="db-table-name">${tableName}</span>
      <span class="row-count">${rows.length} rows · ${cols.length} cols</span>
      <button class="btn btn-ghost btn-sm" onclick="exportCsv()">⬇ CSV</button>
    </div>
    <div class="db-filter-bar">
      <input class="search-input" placeholder="Filter rows…" oninput="filterRows(this.value)">
      <span class="hint" style="margin-left:auto;">${sourceUrl}</span>
    </div>
    <div class="db-table-wrap">
      <table id="dataTable">
        <thead><tr>${headerRow}</tr></thead>
        <tbody id="dataBody">${bodyRows}</tbody>
      </table>
    </div>`;
}

function sortTable(col) {
  if (dbSortCol === col) dbSortDir *= -1;
  else { dbSortCol = col; dbSortDir = 1; }
  const sorted = [...dbCurrentData].sort((a,b) => {
    const av = a[col], bv = b[col];
    if (av == null) return 1; if (bv == null) return -1;
    return String(av).localeCompare(String(bv), undefined, {numeric:true}) * dbSortDir;
  });
  renderDataTable(dbCurrentTable, sorted, '');
}

function filterRows(q) {
  const rows = document.querySelectorAll('#dataBody tr');
  rows.forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

function exportCsv() {
  if (!dbCurrentData.length) return;
  const cols = Object.keys(dbCurrentData[0]);
  const csv = [cols.join(','), ...dbCurrentData.map(r =>
    cols.map(c => JSON.stringify(r[c] ?? '')).join(',')
  )].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${dbCurrentTable}.csv`;
  a.click();
  toast('Exported!', 'success');
}

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
function toast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
buildSidebar();
</script>
